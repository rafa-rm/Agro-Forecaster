name: "Terraform Infrastructure Deploy"

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**' # Only run when infra code changes
      - 'src/**'            # Or when lambda code changes
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/**'
      - 'src/**'

permissions:
  id-token: write # Required for OIDC 
  contents: read  # Required to checkout code

jobs:
  terraform:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./infrastructure # Pointing to .tf files

    steps:
      # 1. Get the code
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Lambda Layer
        working-directory: .
        run: |
          echo "Installing dependencies for AWS Lambda (Python 3.14)..."
          
          # 1. Create the directory structure inside 'layer'
          # AWS expects libraries to be in a folder named 'python' at the root of the zip
          mkdir -p layer/python
          
          # 2. Install dependencies directly into 'layer/python'
          pip install \
            --target=layer/python \
            --python-version 3.14 \
            --only-binary=:all: --upgrade \
            -r src/requirements.txt
          
          # 3. Zip it up
          cd layer
          echo "Zipping contents of layer/python..."
          # This creates the zip with the 'python/' folder at the root
          zip -r ../src/agro_forecaster_layer.zip python/
          cd ..
          
          echo "✅ Zip created at src/agro_forecaster_layer.zip"
          # Verify the size (if it is < 1MB, something is wrong)
          ls -lh src/agro_forecaster_layer.zip

      # 2. Login to AWS using OIDC
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.TF_VAR_aws_region }}

      # 3. Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      # 4. Initialize (Connect to S3 Backend dynamically)
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_NAME }}" \
            -backend-config="key=agro-forecaster/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_VAR_aws_region }}" \
            -backend-config="encrypt=true"

      # 5. Plan
      - name: Terraform Plan
        run: terraform plan -input=false
        env:
          # Maps GitHub Secret -> Terraform Variable
          TF_VAR_github_name: ${{ secrets.TF_VAR_github_name }}
          TF_VAR_github_repo: ${{ secrets.TF_VAR_github_repo }}
          TF_VAR_environment: ${{ secrets.TF_VAR_environment }}
          TF_VAR_agro_bucket_name: ${{ secrets.TF_VAR_agro_bucket_name }}
          TF_VAR_aws_region: ${{ secrets.TF_VAR_aws_region }}

      # 6. Apply (Deploy to Cloud)
      # Only runs on 'main' branch
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_github_name: ${{ secrets.TF_VAR_github_name }}
          TF_VAR_github_repo: ${{ secrets.TF_VAR_github_repo }}
          TF_VAR_environment: ${{ secrets.TF_VAR_environment }}
          TF_VAR_agro_bucket_name: ${{ secrets.TF_VAR_agro_bucket_name }}
          TF_VAR_aws_region: ${{ secrets.TF_VAR_aws_region }}