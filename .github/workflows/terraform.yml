name: "Terraform Infrastructure Deploy"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/**'
      - 'src/**'
  pull_request:
    branches:
      - main
    paths:
      - 'infrastructure/**'
      - 'src/**'

permissions:
  id-token: write # Required for OIDC
  contents: read  # Required to checkout code

jobs:
  terraform:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    
    defaults:
      run:
        shell: bash
        working-directory: ./infrastructure

    # Global job-level variables to keep steps DRY
    env:
      TF_VAR_github_name: ${{ secrets.TF_VAR_github_name }}
      TF_VAR_github_repo: ${{ secrets.TF_VAR_github_repo }}
      TF_VAR_environment: ${{ secrets.TF_VAR_environment }}
      TF_VAR_agro_bucket_name: ${{ secrets.TF_VAR_agro_bucket_name }}
      TF_VAR_aws_region: ${{ secrets.TF_VAR_aws_region }}

    steps:
      # 1. Get the code (Upgraded to v7)
      - name: Checkout Code
        uses: actions/checkout@v7

      # 2. Build Lambda Layer (Python 3.14)
      - name: Build Lambda Layer
        working-directory: .
        run: |
          echo "Installing dependencies for AWS Lambda (Python 3.14)..."
          mkdir -p layer/python
          
          pip install \
            --target=layer/python \
            --python-version 3.14 \
            --only-binary=:all: --upgrade \
            -r src/requirements.txt

          find layer/python -type d -name "__pycache__" -exec rm -rf {} +
          find layer/python -type d -name "tests" -exec rm -rf {} +
          find layer/python -name "*.pyc" -delete
          
          cd layer
          zip -r ../src/agro_forecaster_layer.zip python/
          cd ..
          rm -rf layer # Clean up directory after build

      # 3. Build LiteRT ML Layer (Python 3.14)
      - name: Build LiteRT ML Layer
        working-directory: .
        run: |
          echo "Installing LiteRT dependencies for AWS Lambda (Python 3.14)..."
          mkdir -p ml_layer/python
          
          pip install \
            --target=ml_layer/python \
            --python-version 3.14 \
            --only-binary=:all: --upgrade \
            ai-edge-litert
          
          find ml_layer/python -type d -name "__pycache__" -exec rm -rf {} +
          find ml_layer/python -type d -name "tests" -exec rm -rf {} +
          find ml_layer/python -name "*.pyc" -delete

          cd ml_layer
          zip -r ../src/tflite_layer.zip python/
          cd ..
          rm -rf ml_layer # Clean up directory after build

      # 4. Login to AWS using OIDC (Upgraded to v6.1.0)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.TF_VAR_aws_region }}

      # 5. Install Terraform (Upgraded to v4)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.5.0

      # 6. Initialize
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET_NAME }}" \
            -backend-config="key=agro-forecaster/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_VAR_aws_region }}" \
            -backend-config="encrypt=true"

      # 7. Plan (Saves execution plan securely to an output file)
      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      # 8. Apply (Executes the precise plan generated in Step 7)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: terraform apply -input=false tfplan