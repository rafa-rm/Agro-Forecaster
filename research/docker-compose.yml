version: '3.8'

x-volumes: &shared-volumes
  - .:/app

services:
  # ----------------------------------------
  # 1. MLflow Tracking Server
  # ----------------------------------------
  mlflow:
    image: python:3.12-slim
    container_name: agro_mlflow # 👈 Atualizado
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/mlflow
    working_dir: /mlflow
    command: >
      bash -c "pip install mlflow &&
      mlflow server 
      --host 0.0.0.0 
      --port 5000 
      --backend-store-uri sqlite:///mlflow.db 
      --default-artifact-root ./artifacts"

  # ----------------------------------------
  # 2. JupyterLab (Exploration Environment)
  # ----------------------------------------
  jupyter:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: agro_jupyter # 👈 Atualizado
    ports:
      - "8888:8888"
    depends_on:
      - mlflow
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes: *shared-volumes
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root --NotebookApp.token='' --NotebookApp.password=''

  # ----------------------------------------
  # 3. Model Training Job (Execution Environment)
  # ----------------------------------------
  trainer:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: agro_trainer # 👈 Atualizado
    depends_on:
      - mlflow
    env_file:
      - .env
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes: 
      - .:/app
      - ~/.aws:/root/.aws
    # 👈 Atualizado para a pasta correta (scripts)
    command: python scripts/tune_architectures.py